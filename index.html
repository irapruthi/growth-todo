<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Forest Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="dashboard">
            <div class="stat-card">
                <span class="stat-label">Total Focus</span>
                <span id="totalTime">0h 0m</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Trees Grown</span>
                <span id="treeCount">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Rank</span>
                <span id="rank">Seedling</span>
            </div>
        </div>

        <div class="input-card">
            <input type="text" id="taskInput" placeholder="Plant a new goal...">
            <button onclick="addTask()">Plant</button>
        </div>

        <ul id="taskList"></ul>

        <div class="forest-section">
            <h3>🌲 Your Persistent Forest</h3>
            <div id="gallery" class="gallery"></div>
        </div>

        <div class="rewards-section">
            <h3>🏆 Earned Badges</h3>
            <div id="badgeContainer" class="badge-grid"></div>
        </div>

        <div id="timerOverlay" class="hidden">
            <div class="modal">
                <h2 id="activeTaskName">Task</h2>
                <div id="tree-emoji">🌱</div>
                <div id="timerDisplay">00:00</div>
                <div class="timer-settings">
                    <input type="number" id="minutesInput" value="25"> <span>mins</span>
                </div>
                <button id="startBtn" onclick="toggleTimer()">Start Growing</button>
                <button class="cancel-btn" onclick="closeTimer()">Give Up</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
