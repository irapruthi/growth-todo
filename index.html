<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenGarden | Deep Work Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="gardenCanvas" class="garden-canvas"></div>

    <div class="glass-container">
        <nav>
            <div class="logo">🌿 ZenGarden</div>
            <div class="main-stats">
                <span id="muteBtn" onclick="toggleMute()" style="cursor:pointer; margin-right:10px;">🔊</span>
                <span id="totalTime">0h 0m</span>
                <div class="divider"></div>
                <span id="treeCount">0 Plots</span>
            </div>
        </nav>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="What will you plant?">
            <button class="plant-btn" onclick="plantSeed()">Plant Seed</button>
        </div>

        <div class="scroll-area">
            <h3>Active Seeds (Tasks)</h3>
            <ul id="taskList"></ul>
        </div>
        
        <div class="wave-container">
            <div id="dynamicWave" class="wave"></div>
        </div>
    </div>

    <div id="timerOverlay" class="hidden">
        <div class="blur-bg"></div>
        <div class="modal">
            <div class="growth-circle">
                <div id="tree-emoji">🌱</div>
            </div>
            <h2 id="activeTaskName">Focusing...</h2>
            <div id="timerDisplay">00:25:00</div>
            
            <div class="time-selector">
                <input type="range" id="minutesInput" min="0.5" max="120" step="0.5" value="25" oninput="updateRangeVal(this.value)">
                <p id="rangeVal">25 Minutes</p>
            </div>

            <div class="modal-actions">
                <button id="startBtn" class="primary-btn" onclick="toggleTimer()">Start Growth</button>
                <button class="secondary-btn" onclick="closeTimer()">Abandon</button>
            </div>
        </div>
    </div>

    <audio id="zenAudio" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-forest-ambiance-with-birds-and-insects-1221.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
