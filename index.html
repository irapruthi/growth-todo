<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Forest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌳 Task Forest</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What will you grow today?">
            <button onclick="addTask()">Add Seed</button>
        </div>

        <ul id="taskList"></ul>

        <div id="timerOverlay" class="hidden">
            <div class="modal">
                <h2 id="activeTaskName">Task Name</h2>
                <div id="tree-emoji">🌱</div>
                <div id="timerDisplay">25:00</div>
                <div class="controls">
                    <input type="number" id="minutesInput" value="25" min="1" max="120">
                    <span>mins</span>
                </div>
                <button id="startBtn" onclick="toggleTimer()">Start Growing</button>
                <button class="cancel" onclick="closeTimer()">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
